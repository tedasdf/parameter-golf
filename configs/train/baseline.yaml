run:
  run_id: ""
  seed: 1337
  output_root: artifacts/runs/artifact_probe
  device: cuda
  save_quantized_artifact_summary: true

data:
  data_path: ./data/datasets/fineweb10B_sp1024
  tokenizer_path: ./data/tokenizers/fineweb_1024_bpe.model
  train_files: ""
  val_files: ""

train:
  val_batch_size: 524288
  val_loss_every: 1000
  train_log_every: 200
  iterations: 20000
  warmdown_iters: 1200
  warmup_steps: 20
  micro_batch_tokens_per_rank: 65526
  grad_accum_steps: 1
  train_seq_len: 1024
  max_wallclock_seconds: 0
  checkpoint_every: 1000
  checkpoint_dir: "artifacts/checkpoints"
  checkpoint_prefix: "step"
  
optimizer:
  embed_lr: 0.6
  head_lr: 0.008
  tied_embed_lr: 0.05
  matrix_lr: 0.04
  scalar_lr: 0.04
  muon_momentum: 0.95
  muon_backend_steps: 5
  muon_momentum_warmup_start: 0.85
  muon_momentum_warmup_steps: 500
  beta1: 0.9
  beta2: 0.95
  adam_eps: 1.0e-8
  grad_clip_norm: 0.0

wandb:
  enabled: true
  project: parameter-golf
  entity: ""
  mode: online
  tags: ["artifact-probe"]

model:
  vocab_size: 1024
  num_layers: 9
  model_dim: 512
  head_dim: 64
  gqa_ratio: 2
  auto_derive_attention_shapes: true
  num_heads: 8
  num_kv_heads: 4
  mlp_mult: 2
  tie_embeddings: true
  tied_embed_init_std: 0.005
  logit_softcap: 30.0
  rope_base: 10000.0
  qk_gain_init: 1.5
  dtype: bfloat16
  block_type: baseline
  attention_type: gqa
  mlp_type: relu2
  norm_type: rmsnorm

code:
  enabled: true
  manifest_name: code_manifest.txt
  include_config_code: true
  include_optimizer_code: false
  optimizer_file: src/model/optimizer.py

quant:
  enabled: true
  zlib_level: 9
  artifact_name: final_model.int8.ptz
  write_quant_artifact_to_disk: true
  keep_float_fp32_name_patterns:
    - attn_scale
    - attn_scales
    - mlp_scale
    - mlp_scales
    - resid_mix
    - resid_mixes
    - q_gain
    - skip_weight
    - skip_weights
  keep_float_max_numel: 65536
  keep_float_store_dtype: float16
  per_row_scale_dtype: float16
  clip_percentile: 99.99984

branch:
  enabled: true
  checkpoint_path: "./artifacts/checkpoints/step_5000.pt"
  batch_multiplier: 2.0
  delta_tokens: 0
  base_effective_train_batch_tokens: 524288
  lr_scale_rule: "sqrt"