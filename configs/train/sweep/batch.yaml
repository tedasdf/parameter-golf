program: train.py
method: grid
name: cbs_branch_sweep_step5000_small

metric:
  name: eval/loss
  goal: minimize

command:
  - .golf_param\Scripts\python.exe
  - src/train.py
  - --config
  - configs/train.yaml
  - branch.enabled=true
  - branch.checkpoint_path=artifacts/checkpoints/step_5000.pt
  - branch.base_effective_train_batch_tokens=524288
  - branch.delta_tokens=1048576
  - branch.lr_scale_rule=sqrt
  - train.warmup_steps=0

parameters:
  branch.batch_multiplier:
    values: [1.0, 2.0, 4.0, 8.0]